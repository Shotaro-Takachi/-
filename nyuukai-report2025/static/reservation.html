<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>予約登録</title>
  </head>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const selects = document.querySelectorAll(
        'select[name="first_choice"], select[name="second_choice"], select[name="third_choice"]'
      );

      function updateOptions() {
        // 現在選択されている値を取得
        const selectedValues = Array.from(selects)
          .map((sel) => sel.value)
          .filter((value) => value);

        selects.forEach((select) => {
          Array.from(select.options).forEach((option) => {
            if (option.value) {
              // その選択肢がすでに他の select で選ばれているかチェック
              if (
                selectedValues.includes(option.value) &&
                select.value !== option.value
              ) {
                option.disabled = true;
              } else {
                option.disabled = false;
              }
            }
          });
        });
      }

      // `change` イベントを各 `select` に適用
      selects.forEach((select) => {
        select.addEventListener("change", updateOptions);
      });

      // ページ読み込み時に一度実行しておく（リロード時の対策）
      updateOptions();
    });
  </script>
  <body>
    <p>予約登録</p>
    <form method="POST" action="submit" accept-charset="UTF-8">
      <p>
        第一希望局:
        <select name="first_choice" required>
          <option value="" selected>選択してください</option>

        </select>
      </p>

          <option value="18:00">18:00〜</option>
